<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toffee & Shantel - Private Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { transition: background 0.3s, color 0.3s; font-family: system-ui, -apple-system, 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .theme-dark { background: #2A829E; color: #EBF5F8; }
        .theme-dark .glass { background: rgba(20, 65, 80, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(235, 245, 248, 0.1); }
        .theme-dark .bubble-me { background: #4CC9F0; color: #0f172a; }
        .theme-dark .bubble-them { background: rgba(255, 255, 255, 0.12); color: #EBF5F8; }
        .theme-dark .input-field { background: rgba(0, 0, 0, 0.2); border-color: rgba(255, 255, 255, 0.15); color: white; }
        .theme-light { background: #EBF5F8; color: #2A829E; }
        .theme-light .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); }
        .theme-light .bubble-me { background: #2A829E; color: white; }
        .theme-light .bubble-them { background: white; color: #2A829E; border: 1px solid #BDD9E1; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 6px; box-shadow: 0 0 6px #22c55e; }
        #chat-box::-webkit-scrollbar { width: 3px; }
        .call-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.96); z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(10px); }
        .remote-video { width: 100%; max-width: 400px; border-radius: 24px; background: #1a1a2e; min-height: 300px; object-fit: cover; }
        .local-video { position: absolute; bottom: 100px; right: 16px; width: 100px; border-radius: 16px; border: 2px solid white; background: #000; }
        @media (max-width: 600px) { .local-video { width: 80px; bottom: 90px; } .remote-video { min-height: 250px; } }
        .msg-pop { animation: msgPop 0.2s ease-out; }
        @keyframes msgPop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="main-body" class="theme-dark flex items-center justify-center p-2">

    <div id="login-screen" class="glass p-8 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
        <div class="text-5xl mb-3">🌊</div>
        <h2 class="text-lg font-black mb-6 tracking-[0.2em] text-blue-500 uppercase">TOFFEE & SHANTEL</h2>
        <input id="nameInput" type="text" placeholder="Name (Toffee or Shantel)" class="input-field w-full p-3 rounded-2xl mb-3 outline-none border text-center">
        <input id="passInput" type="password" placeholder="Key" class="input-field w-full p-3 rounded-2xl mb-5 outline-none border text-center">
        <button onclick="checkAccess()" class="w-full bg-blue-600 text-white p-3 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">ACCESS</button>
        <p class="text-[9px] opacity-50 mt-4">Key: toffee</p>
    </div>

    <div id="chat-screen" class="hidden w-full max-w-md h-[95vh] flex flex-col glass rounded-[3rem] overflow-hidden relative shadow-2xl">
        <div class="p-4 border-b border-white/10 flex justify-between items-center">
            <div id="active-users" class="flex flex-col text-xs"></div>
            <div class="flex gap-2">
                <button id="theme-btn" onclick="toggleTheme()" class="bg-slate-800/40 w-9 h-9 rounded-full text-lg">🌙</button>
                <div class="relative">
                    <button onclick="document.getElementById('mood-menu').classList.toggle('hidden')" class="bg-slate-800/40 w-9 h-9 rounded-full text-lg">😊</button>
                    <div id="mood-menu" class="hidden absolute right-0 mt-2 p-2 bg-slate-800 rounded-2xl flex gap-2 z-50">
                        <button onclick="updateMood('📚')" class="text-xl px-2">📚</button>
                        <button onclick="updateMood('😴')" class="text-xl px-2">😴</button>
                        <button onclick="updateMood('🍕')" class="text-xl px-2">🍕</button>
                        <button onclick="updateMood('🎵')" class="text-xl px-2">🎵</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-4 py-2">
            <div class="bg-blue-500/10 p-2 rounded-xl text-center text-xs">
                <p id="pinText" class="text-blue-500">📌 No pinned notes...</p>
                <div class="flex gap-2 mt-1">
                    <input id="pinInput" type="text" placeholder="Update pin..." class="bg-transparent text-xs outline-none border-b border-blue-500/30 flex-1">
                    <button onclick="savePin()" class="text-xs text-blue-500 font-bold">Pin</button>
                </div>
            </div>
        </div>

        <div id="reply-preview" class="hidden px-4 py-2 bg-blue-500/10 border-b border-blue-500/20 flex justify-between items-center text-xs">
            <div><span id="reply-user" class="font-bold text-blue-500"></span>: <span id="reply-text" class="opacity-70"></span></div>
            <button onclick="cancelReply()" class="text-white/50 text-lg leading-4">✕</button>
        </div>

        <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-2"></div>
        <div id="typing-indicator" class="px-5 py-1 text-[9px] italic text-blue-500 h-4"></div>

        <div class="p-4 flex gap-2">
            <input id="msgInput" type="text" placeholder="Message..." oninput="handleTyping()" onkeypress="if(event.key==='Enter') sendMessage()" class="input-field flex-1 p-3 rounded-2xl outline-none border text-sm">
            <button onclick="sendMessage()" class="bg-blue-600 text-white w-12 h-12 rounded-2xl font-bold shadow-lg active:scale-90 transition-all text-xl">➤</button>
        </div>
    </div>

    <div id="call-modal" class="call-modal hidden">
        <div class="relative w-full max-w-md px-4">
            <video id="remote-video" class="remote-video" autoplay playsinline></video>
            <video id="local-video" class="local-video" autoplay playsinline muted></video>
            <div class="absolute bottom-6 left-0 right-0 flex justify-center gap-3">
                <button onclick="hangUp()" class="bg-red-600 text-white px-5 py-2.5 rounded-full font-bold shadow-lg active:scale-95 text-sm">📞 Hang Up</button>
                <button id="toggle-mic" onclick="toggleMic()" class="bg-gray-700 text-white px-3 py-2.5 rounded-full text-lg active:scale-95">🎤</button>
                <button id="toggle-cam" onclick="toggleCam()" class="bg-gray-700 text-white px-3 py-2.5 rounded-full text-lg active:scale-95">📷</button>
            </div>
            <p id="call-status" class="text-center text-white mt-4 text-xs font-medium">Connecting...</p>
        </div>
    </div>

    <script type="module">
        const ALLOWED_USERS = ["Toffee", "Shantel"];
        const ACCESS_KEY = "toffee";
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildChanged, onValue, set, update, serverTimestamp, onDisconnect, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDw_WkrANnsPvrnhqONu4Jx7U8BkrduL38",
            authDomain: "private-chart.firebaseapp.com",
            databaseURL: "https://private-chart-default-rtdb.firebaseio.com", 
            projectId: "private-chart",
            storageBucket: "private-chart.appspot.com",
            messagingSenderId: "808076132779",
            appId: "1:808076132779:web:456dbb1336d73ab661d2ee"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');
        const pinRef = ref(db, 'pinnedNote');
        const callsRef = ref(db, 'calls');
        
        let currentUser = "";
        let replyingTo = null;
        let localStream = null;
        let peerConnection = null;
        let currentCallId = null;
        let pendingCandidates = [];
        let callListeners = [];
        
        const msgSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');
        
        const rtcConfig = { 
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' },
                { 
                    urls: 'turn:openrelay.metered.ca:80',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                },
                {
                    urls: 'turn:openrelay.metered.ca:443',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                }
            ],
            iceCandidatePoolSize: 10
        };

        function removeCallListeners() {
            callListeners.forEach(({ ref, listener }) => {
                off(ref, listener);
            });
            callListeners = [];
        }

        window.toggleTheme = () => {
            const body = document.getElementById('main-body');
            const isLight = body.classList.toggle('theme-light');
            document.getElementById('theme-btn').innerText = isLight ? "☀️" : "🌙";
        };

        window.checkAccess = () => {
            const name = document.getElementById('nameInput').value.trim();
            const pass = document.getElementById('passInput').value;
            
            if (pass === ACCESS_KEY && name !== "" && ALLOWED_USERS.includes(name)) {
                currentUser = name;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('chat-screen').classList.remove('hidden');
                setUserStatus();
                loadMessages();
                loadPinnedNote();
                listenForCalls();
            } else if (pass !== ACCESS_KEY) {
                alert("Wrong key!");
            } else if (!ALLOWED_USERS.includes(name)) {
                alert("Only Toffee or Shantel can access");
            }
        };

        function setUserStatus() {
            const statusRef = ref(db, `status/${currentUser}`);
            set(statusRef, { online: true, lastSeen: new Date().toISOString(), typing: false, mood: "👋" });
            onDisconnect(statusRef).update({ online: false, lastSeen: new Date().toISOString(), typing: false });
            
            onValue(ref(db, 'status'), (snapshot) => {
                const statuses = snapshot.val();
                let html = "", typingHtml = "";
                
                for(let u in statuses) {
                    if(u !== currentUser && ALLOWED_USERS.includes(u)) {
                        const s = statuses[u];
                        const dot = s.online ? '<span class="status-dot"></span>' : '● ';
                        
                        let timeDisplay = s.online ? 'Online now' : 'Offline';
                        if (!s.online && s.lastSeen) {
                            const mins = Math.floor((new Date() - new Date(s.lastSeen)) / 60000);
                            timeDisplay = mins < 1 ? 'just now' : mins < 60 ? `${mins} min ago` : `${Math.floor(mins/60)} hr ago`;
                        }
                        
                        const moodStr = s.mood ? ` ${s.mood}` : "";
                        const callBtns = s.online ? `
                            <div class="flex gap-1 mt-1">
                                <button onclick="window.startCall('${u}','audio')" class="text-[9px] bg-blue-600/50 px-2 py-0.5 rounded-full">🎵 Call</button>
                                <button onclick="window.startCall('${u}','video')" class="text-[9px] bg-green-600/50 px-2 py-0.5 rounded-full">📹 Video</button>
                            </div>
                        ` : '';
                        
                        html += `<div class="mb-2 p-1 rounded-lg bg-white/5"><div class="text-xs font-bold flex items-center">${dot}${u}${moodStr}</div><div class="text-[9px] opacity-50">${timeDisplay}</div>${callBtns}</div>`;
                        if(s.typing) typingHtml = `${u} is typing...`;
                    }
                }
                document.getElementById('active-users').innerHTML = html || '<div class="text-xs opacity-50 p-2">No other users online</div>';
                document.getElementById('typing-indicator').innerHTML = typingHtml;
            });
        }

        window.startCall = async (targetUser, type) => {
            if (peerConnection) {
                alert("Already in a call");
                return;
            }
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: type === 'video', 
                    audio: true 
                });
                
                document.getElementById('local-video').srcObject = localStream;
                document.getElementById('call-modal').classList.remove('hidden');
                document.getElementById('call-status').innerText = `Calling ${targetUser}...`;
                
                currentCallId = `${currentUser}_to_${targetUser}_${Date.now()}`;
                const callData = {
                    from: currentUser,
                    to: targetUser,
                    type: type,
                    status: 'calling',
                    timestamp: serverTimestamp(),
                    createdAt: Date.now()
                };
                await set(ref(db, `calls/${currentCallId}`), callData);
                
                peerConnection = new RTCPeerConnection(rtcConfig);
                pendingCandidates = [];
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        push(ref(db, `calls/${currentCallId}/candidates`), event.candidate);
                    }
                };
                
                peerConnection.ontrack = (event) => {
                    document.getElementById('remote-video').srcObject = event.streams[0];
                    document.getElementById('call-status').innerText = `Connected to ${targetUser}`;
                };
                
                peerConnection.onconnectionstatechange = () => {
                    if (peerConnection.connectionState === 'connected') {
                        document.getElementById('call-status').innerText = `Connected to ${targetUser}`;
                    } else if (['disconnected', 'failed', 'closed'].includes(peerConnection.connectionState)) {
                        hangUp();
                    }
                };
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                await update(ref(db, `calls/${currentCallId}`), { 
                    offer: { type: offer.type, sdp: offer.sdp },
                    status: 'offer_sent'
                });
                
                // Listen for answer
                const answerRef = ref(db, `calls/${currentCallId}/answer`);
                const answerListener = onValue(answerRef, (snapshot) => {
                    const answer = snapshot.val();
                    if (answer && peerConnection && peerConnection.signalingState === 'have-local-offer') {
                        peerConnection.setRemoteDescription(new RTCSessionDescription(answer)).catch(e => console.log(e));
                    }
                });
                callListeners.push({ ref: answerRef, listener: answerListener });
                
                // Listen for status changes (reject/end)
                const statusRef = ref(db, `calls/${currentCallId}/status`);
                const statusListener = onValue(statusRef, (snapshot) => {
                    const status = snapshot.val();
                    if (status === 'rejected') {
                        alert(`${targetUser} rejected the call`);
                        hangUp();
                    } else if (status === 'ended' && peerConnection) {
                        hangUp();
                    }
                });
                callListeners.push({ ref: statusRef, listener: statusListener });
                
                // Listen for ICE candidates with queue
                const candidatesRef = ref(db, `calls/${currentCallId}/candidates`);
                const candidateListener = onChildAdded(candidatesRef, (snapshot) => {
                    const candidate = snapshot.val();
                    if (candidate) {
                        if (peerConnection && peerConnection.remoteDescription) {
                            peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => console.log(e));
                        } else {
                            pendingCandidates.push(candidate);
                        }
                    }
                });
                callListeners.push({ ref: candidatesRef, listener: candidateListener });
                
                // Process pending candidates once remote description is set
                const waitForRemoteDesc = setInterval(() => {
                    if (peerConnection && peerConnection.remoteDescription) {
                        while (pendingCandidates.length) {
                            peerConnection.addIceCandidate(new RTCIceCandidate(pendingCandidates.shift())).catch(e => console.log(e));
                        }
                        clearInterval(waitForRemoteDesc);
                    }
                }, 500);
                
            } catch (err) {
                console.error(err);
                alert("Cannot access camera/microphone. Please check permissions.");
                hangUp();
            }
        };

        function listenForCalls() {
            onChildAdded(callsRef, (snapshot) => {
                const call = snapshot.val();
                if (call.to === currentUser && call.status === 'calling') {
                    const accept = confirm(`${call.from} is calling you (${call.type.toUpperCase()})\n\nClick OK to answer`);
                    if (accept) {
                        acceptCall(snapshot.key, call);
                    } else {
                        update(ref(db, `calls/${snapshot.key}`), { status: 'rejected' });
                    }
                }
            });
        }

        async function acceptCall(callId, call) {
            if (peerConnection) {
                alert("Already in a call");
                return;
            }
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: call.type === 'video', 
                    audio: true 
                });
                
                document.getElementById('local-video').srcObject = localStream;
                document.getElementById('call-modal').classList.remove('hidden');
                document.getElementById('call-status').innerText = `Connecting to ${call.from}...`;
                currentCallId = callId;
                
                peerConnection = new RTCPeerConnection(rtcConfig);
                pendingCandidates = [];
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        push(ref(db, `calls/${callId}/candidates`), event.candidate);
                    }
                };
                
                peerConnection.ontrack = (event) => {
                    document.getElementById('remote-video').srcObject = event.streams[0];
                    document.getElementById('call-status').innerText = `Connected to ${call.from}`;
                };
                
                peerConnection.onconnectionstatechange = () => {
                    if (peerConnection.connectionState === 'connected') {
                        document.getElementById('call-status').innerText = `Connected to ${call.from}`;
                    } else if (['disconnected', 'failed', 'closed'].includes(peerConnection.connectionState)) {
                        hangUp();
                    }
                };
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                if (!call.offer) {
                    hangUp();
                    return;
                }
                
                await peerConnection.setRemoteDescription(new RTCSessionDescription(call.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await update(ref(db, `calls/${callId}`), { 
                    answer: { type: answer.type, sdp: answer.sdp },
                    status: 'connected'
                });
                
                // Listen for ICE candidates with queue
                const candidatesRef = ref(db, `calls/${callId}/candidates`);
                const candidateListener = onChildAdded(candidatesRef, (snapshot) => {
                    const candidate = snapshot.val();
                    if (candidate) {
                        if (peerConnection && peerConnection.remoteDescription) {
                            peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => console.log(e));
                        } else {
                            pendingCandidates.push(candidate);
                        }
                    }
                });
                callListeners.push({ ref: candidatesRef, listener: candidateListener });
                
                // Process pending candidates
                const waitForRemoteDesc = setInterval(() => {
                    if (peerConnection && peerConnection.remoteDescription) {
                        while (pendingCandidates.length) {
                            peerConnection.addIceCandidate(new RTCIceCandidate(pendingCandidates.shift())).catch(e => console.log(e));
                        }
                        clearInterval(waitForRemoteDesc);
                    }
                }, 500);
                
            } catch (err) {
                console.error(err);
                alert("Call failed");
                hangUp();
            }
        }

        window.hangUp = () => {
            removeCallListeners();
            
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (currentCallId) {
                update(ref(db, `calls/${currentCallId}`), { status: 'ended' }).catch(() => {});
                currentCallId = null;
            }
            pendingCandidates = [];
            
            document.getElementById('call-modal').classList.add('hidden');
            document.getElementById('remote-video').srcObject = null;
            document.getElementById('local-video').srcObject = null;
        };

        window.toggleMic = () => {
            const audioTrack = localStream?.getAudioTracks()[0];
            if (audioTrack) {
                audioTrack.enabled = !audioTrack.enabled;
                document.getElementById('toggle-mic').style.opacity = audioTrack.enabled ? '1' : '0.5';
            }
        };
        
        window.toggleCam = () => {
            const videoTrack = localStream?.getVideoTracks()[0];
            if (videoTrack) {
                videoTrack.enabled = !videoTrack.enabled;
                document.getElementById('toggle-cam').style.opacity = videoTrack.enabled ? '1' : '0.5';
            }
        };

        window.updateMood = (mood) => {
            update(ref(db, `status/${currentUser}`), { mood: mood });
            document.getElementById('mood-menu').classList.add('hidden');
        };

        window.savePin = () => {
            const text = document.getElementById('pinInput').value.trim();
            if (text) {
                set(pinRef, { text: text });
                document.getElementById('pinInput').value = "";
            }
        };

        function loadPinnedNote() {
            onValue(pinRef, (snapshot) => {
                const data = snapshot.val();
                if (data && data.text) {
                    document.getElementById('pinText').innerHTML = `📌 ${data.text}`;
                }
            });
        }

        window.handleTyping = () => {
            update(ref(db, `status/${currentUser}`), { typing: document.getElementById('msgInput').value.length > 0 });
        };

        window.setReply = (data) => {
            replyingTo = data;
            document.getElementById('reply-user').innerHTML = data.username;
            document.getElementById('reply-text').innerHTML = data.message.substring(0, 50);
            document.getElementById('reply-preview').classList.remove('hidden');
        };

        window.cancelReply = () => {
            replyingTo = null;
            document.getElementById('reply-preview').classList.add('hidden');
        };

        window.sendMessage = () => {
            const text = document.getElementById('msgInput').value.trim();
            if (text) {
                push(messagesRef, {
                    username: currentUser,
                    message: text,
                    seen: false,
                    timestamp: serverTimestamp(),
                    replyTo: replyingTo
                });
                document.getElementById('msgInput').value = "";
                cancelReply();
                update(ref(db, `status/${currentUser}`), { typing: false });
            }
        };

        function loadMessages() {
            onChildAdded(messagesRef, (snapshot) => {
                const data = snapshot.val();
                if (data.username !== currentUser && !data.seen) {
                    update(ref(db, `messages/${snapshot.key}`), { seen: true });
                    msgSound.play().catch(() => {});
                }
                renderMessage(snapshot);
            });
            
            onChildChanged(messagesRef, (snapshot) => {
                const msgElement = document.getElementById(`msg-${snapshot.key}`);
                if (msgElement && snapshot.val().seen) {
                    const statusSpan = msgElement.querySelector('.read-status');
                    if (statusSpan) {
                        statusSpan.innerHTML = 'Seen';
                        statusSpan.classList.add('text-blue-400');
                    }
                }
            });
        }

        function renderMessage(snapshot) {
            const data = snapshot.val();
            const isMe = data.username === currentUser;
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.id = `msg-${snapshot.key}`;
            div.className = `flex ${isMe ? 'flex-row-reverse' : 'flex-row'} mb-2 gap-2 msg-pop`;
            
            const timeStr = data.timestamp ? new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
            const replyHtml = data.replyTo ? `<div class="bg-black/20 p-1.5 rounded-lg mb-1 text-[9px] border-l-2 border-blue-500"><b>${escapeHtml(data.replyTo.username)}</b>: ${escapeHtml(data.replyTo.message.substring(0, 40))}</div>` : '';
            
            div.innerHTML = `
                <div class="${isMe ? 'bubble-me rounded-l-2xl rounded-tr-2xl' : 'bubble-them rounded-r-2xl rounded-tl-2xl'} p-3 max-w-[80%] shadow-sm">
                    ${replyHtml}
                    <p class="text-[9px] opacity-60 font-bold mb-0.5 uppercase">${escapeHtml(data.username)}</p>
                    <p class="text-sm break-words">${escapeHtml(data.message)}</p>
                    <div class="flex justify-end gap-1 mt-1">
                        <span class="text-[8px] opacity-40">${timeStr}</span>
                        ${isMe ? `<span class="read-status text-[8px] font-bold ${data.seen ? 'text-blue-400' : 'text-gray-400'}">${data.seen ? 'Seen' : '✓✓'}</span>` : ''}
                    </div>
                </div>
            `;
            
            let startX = 0;
            div.addEventListener('touchstart', (e) => startX = e.touches[0].clientX);
            div.addEventListener('touchend', (e) => {
                const diff = e.changedTouches[0].clientX - startX;
                if (diff > 40) setReply(data);
            });
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
