<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Cloud Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { transition: background 0.3s, color 0.3s; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Dark Theme */
        .theme-dark { background: #0f172a; color: white; }
        .theme-dark .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .theme-dark .bubble-me { background: #2563eb; color: white; }
        .theme-dark .bubble-them { background: #1e293b; color: white; }
        .theme-dark .input-field { background: #0f172a; border-color: #334155; color: white; }

        /* Light Theme */
        .theme-light { background: #f8fafc; color: #1e293b; }
        .theme-light .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(0,0,0,0.05); }
        .theme-light .bubble-me { background: #3b82f6; color: white; }
        .theme-light .bubble-them { background: #e2e8f0; color: #1e293b; }
        .theme-light .input-field { background: white; border-color: #cbd5e1; color: #1e293b; }

        .msg-container { touch-action: pan-y; position: relative; transition: transform 0.1s; }
        .reply-icon-bg { position: absolute; left: -30px; top: 50%; transform: translateY(-50%); opacity: 0; transition: 0.2s; font-size: 18px; color: #3b82f6; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 6px; box-shadow: 0 0 8px #22c55e; }
        
        #chat-box::-webkit-scrollbar { width: 3px; }
        #chat-box::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .msg-pop { animation: msgPop 0.3s ease-out; }
        @keyframes msgPop { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="main-body" class="theme-dark flex items-center justify-center p-2">

    <div id="login-screen" class="glass p-10 rounded-[3rem] w-full max-sm text-center shadow-2xl">
        <div class="text-4xl mb-4">💎</div>
        <h2 id="display-title-login" class="text-xl font-black mb-8 tracking-[0.2em] text-blue-500 uppercase">TOFFEE & SHANTEL</h2>
        <input id="nameInput" type="text" placeholder="lyn" class="input-field w-full p-4 rounded-2xl mb-4 outline-none border transition-all">
        <input id="passInput" type="password" placeholder="Key" class="input-field w-full p-4 rounded-2xl mb-8 outline-none border transition-all">
        <button onclick="checkAccess()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">ACCESS</button>
    </div>

    <div id="chat-screen" class="hidden w-full max-w-md h-[94vh] flex flex-col glass rounded-[3rem] overflow-hidden relative shadow-2xl">
        <div class="p-5 border-b border-white/10 flex justify-between items-center">
            <div id="active-users" class="flex flex-col"></div>
            <div class="flex gap-3">
                <button id="theme-btn" onclick="toggleTheme()" class="bg-slate-800/40 p-2.5 rounded-full border border-white/5 shadow-inner">🌙</button>
                <div class="relative">
                    <button onclick="document.getElementById('mood-menu').classList.toggle('hidden')" class="bg-slate-800/40 p-2.5 rounded-full border border-white/5 shadow-inner">😊</button>
                    <div id="mood-menu" class="hidden absolute right-0 mt-3 p-2 bg-slate-800 rounded-2xl flex gap-2 z-50 shadow-2xl">
                        <button onclick="updateMood('📚')">📚</button><button onclick="updateMood('😴')">😴</button><button onclick="updateMood('🍕')">🍕</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-5 py-3">
            <div class="bg-blue-500/10 p-3 rounded-2xl border border-blue-500/20 text-center">
                <p id="pinText" class="text-[10px] font-medium text-blue-500 italic">No pinned notes...</p>
                <div class="flex gap-2 mt-1">
                    <input id="pinInput" type="text" placeholder="Update pin..." class="bg-transparent text-[10px] outline-none border-b border-blue-500/30 flex-1">
                    <button onclick="savePin()" class="text-[10px] font-bold text-blue-500 uppercase">Pin</button>
                </div>
            </div>
        </div>

        <div id="reply-preview" class="hidden px-5 py-2 bg-blue-500/10 border-b border-blue-500/20 flex justify-between items-center">
            <div class="text-[10px]">
                <p class="text-blue-500 font-bold" id="reply-user"></p>
                <p class="opacity-60 truncate w-48" id="reply-text"></p>
            </div>
            <button onclick="cancelReply()" class="text-xs opacity-50">✕</button>
        </div>

        <div id="chat-box" class="flex-1 p-5 overflow-y-auto space-y-3"></div>
        <div id="typing-indicator" class="px-6 py-1 text-[10px] h-4 italic text-blue-500"></div>

        <div class="p-5 flex items-center gap-3">
            <input id="msgInput" type="text" placeholder="Message..." oninput="handleTyping()" onkeypress="if(event.key === 'Enter') sendMessage()" class="input-field flex-1 p-4 rounded-2xl outline-none border transition-all">
            <button onclick="sendMessage()" class="bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-90 transition-all">➤</button>
        </div>
    </div>

    <script type="module">
        const DEV_SETTINGS = { ACCESS_KEY: "toffee", VAULT_NAME: "TOFFEE & SHANTEL" };
        const ALLOWED_USERS = ["Toffee", "Shantel"];

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildChanged, onValue, set, update, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDw_WkrANnsPvrnhqONu4Jx7U8BkrduL38",
            authDomain: "private-chart.firebaseapp.com",
            databaseURL: "https://private-chart-default-rtdb.firebaseio.com", 
            projectId: "private-chart",
            storageBucket: "private-chart.appspot.com",
            messagingSenderId: "808076132779",
            appId: "1:808076132779:web:456dbb1336d73ab661d2ee"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');
        const pinRef = ref(db, 'pinnedNote');
        let currentUser = "";
        let replyingTo = null;
        const msgSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');

        window.toggleTheme = () => {
            const body = document.getElementById('main-body');
            const btn = document.getElementById('theme-btn');
            const isDark = body.classList.toggle('theme-light'); 
            // Invert logic for the icon: if theme-light is added, show Sun.
            btn.innerText = body.classList.contains('theme-light') ? "☀️" : "🌙";
        };

        window.checkAccess = () => {
            const name = document.getElementById('nameInput').value;
            const pass = document.getElementById('passInput').value;
            if (pass === DEV_SETTINGS.ACCESS_KEY && name.trim() !== "") {
                currentUser = name;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('chat-screen').classList.remove('hidden');
                setUserStatus(); loadMessages(); loadPinnedNote();
            } else { alert("Key Incorrect"); }
        };

        function setUserStatus() {
            if (!ALLOWED_USERS.includes(currentUser)) return;
            const statusRef = ref(db, `status/${currentUser}`);
            set(statusRef, { online: true, lastSeen: serverTimestamp(), typing: false, mood: "👋" });
            onDisconnect(statusRef).update({ online: false, lastSeen: serverTimestamp(), typing: false });

            onValue(ref(db, 'status'), (snapshot) => {
                const statuses = snapshot.val();
                let html = "", typingHtml = "";
                for(let u in statuses) {
                    if(u !== currentUser && ALLOWED_USERS.includes(u)) {
                        const s = statuses[u];
                        const dot = s.online ? '<span class="status-dot"></span>' : '';
                        const moodStr = s.mood ? ` ${s.mood}` : "";
                        const time = s.online ? 'Online' : `Last seen ${new Date(s.lastSeen).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
                        html += `<div class="flex flex-col"><div class="text-[12px] font-bold flex items-center">${dot}${u}${moodStr}</div><div class="text-[8px] opacity-50 uppercase">${time}</div></div>`;
                        if(s.typing) typingHtml = `${u} is typing...`;
                    }
                }
                document.getElementById('active-users').innerHTML = html;
                document.getElementById('typing-indicator').innerHTML = typingHtml;
            });
        }

        window.updateMood = (e) => { 
            if(ALLOWED_USERS.includes(currentUser)) {
                update(ref(db, `status/${currentUser}`), { mood: e }); 
                document.getElementById('mood-menu').classList.add('hidden'); 
            }
        };

        window.savePin = () => { 
            const n = document.getElementById('pinInput').value; 
            if(n.trim() !== "") {
                set(pinRef, { text: n }); 
                document.getElementById('pinInput').value = "";
            }
        };

        function loadPinnedNote() { 
            onValue(pinRef, (s) => { 
                if(s.val()) document.getElementById('pinText').innerText = `📌 ${s.val().text}`; 
            }); 
        }

        window.handleTyping = () => {
            if(ALLOWED_USERS.includes(currentUser)) {
                update(ref(db, `status/${currentUser}`), { typing: document.getElementById('msgInput').value.length > 0 });
            }
        };

        window.initSwipe = (el, msgData) => {
            let startX = 0;
            el.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            el.addEventListener('touchmove', e => {
                let diff = e.touches[0].clientX - startX;
                if (diff > 0 && diff < 70) { 
                    el.style.transform = `translateX(${diff}px)`;
                    el.querySelector('.reply-icon-bg').style.opacity = diff/70;
                }
            });
            el.addEventListener('touchend', e => {
                let diff = e.changedTouches[0].clientX - startX;
                if (diff > 50) setReply(msgData);
                el.style.transform = `translateX(0px)`;
                el.querySelector('.reply-icon-bg').style.opacity = 0;
            });
        };

        window.setReply = (data) => {
            replyingTo = data;
            document.getElementById('reply-user').innerText = data.username;
            document.getElementById('reply-text').innerText = data.message;
            document.getElementById('reply-preview').classList.remove('hidden');
            document.getElementById('msgInput').focus();
        };

        window.cancelReply = () => {
            replyingTo = null;
            document.getElementById('reply-preview').classList.add('hidden');
        };

        window.sendMessage = () => {
            const t = document.getElementById('msgInput').value;
            if (t.trim() !== "") {
                push(messagesRef, { 
                    username: currentUser, 
                    message: t, 
                    seen: false, 
                    timestamp: serverTimestamp(),
                    replyTo: replyingTo 
                });
                document.getElementById('msgInput').value = "";
                cancelReply();
                if(ALLOWED_USERS.includes(currentUser)) update(ref(db, `status/${currentUser}`), { typing: false });
            }
        };

        function loadMessages() {
            onChildAdded(messagesRef, (s) => {
                const d = s.val();
                if (d.username !== currentUser) {
                    if(!d.seen) update(ref(db, `messages/${s.key}`), { seen: true });
                    msgSound.play().catch(()=>{});
                }
                renderMessage(s);
            });
            onChildChanged(messagesRef, (s) => {
                const el = document.getElementById(`msg-${s.key}`);
                if (el) {
                    const statusText = el.querySelector('.read-status');
                    if (s.val().seen) {
                        statusText.innerText = 'Seen';
                        statusText.classList.remove('text-gray-400');
                        statusText.classList.add('text-blue-400');
                    }
                }
            });
        }

        function renderMessage(s) {
            const d = s.val();
            const isMe = d.username === currentUser;
            const chatBox = document.getElementById('chat-box');
            const container = document.createElement('div');
            container.id = `msg-${s.key}`;
            container.className = `msg-container flex ${isMe ? 'flex-row-reverse' : 'flex-row'} mb-2 items-end gap-2 msg-pop`;
            
            let replyHTML = d.replyTo ? `<div class="bg-black/20 p-2 rounded-lg mb-1 text-[9px] border-l-2 border-blue-500"><b>${d.replyTo.username}</b>: ${d.replyTo.message}</div>` : '';
            let checkMark = d.seen ? 'Seen' : '✓✓';

            container.innerHTML = `
                <div class="reply-icon-bg">↩</div>
                <div class="${isMe ? 'bubble-me rounded-l-2xl rounded-tr-2xl' : 'bubble-them rounded-r-2xl rounded-tl-2xl'} p-3 max-w-[80%] shadow-sm">
                    ${replyHTML}
                    <p class="text-[8px] opacity-50 font-bold mb-1 uppercase">${d.username}</p>
                    <p class="text-sm">${d.message}</p>
                    <div class="flex items-center justify-end mt-1 space-x-1">
                        <p class="text-[7px] opacity-40">${d.timestamp ? new Date(d.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}</p>
                        ${isMe ? `<span class="read-status text-[8px] font-bold ${d.seen ? 'text-blue-400' : 'text-gray-400'}">${checkMark}</span>` : ''}
                    </div>
                </div>`;
            
            initSwipe(container, d);
            chatBox.appendChild(container);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
